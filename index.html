<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studentinbjudan – [Namn]</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="invitation">

    <div class="deco deco--top"></div>

    <header class="invitation__header">
      <p class="invitation__preamble">Härmed inbjudes du att fira</p>
      <h1 class="invitation__name">Selmer Månsson</h1>
      <p class="invitation__title">Student!</p>
    </header>

    <section class="invitation__details">
      <div class="detail">
        <span class="detail__label">Datum</span>
        <span class="detail__value">Onsdagen, den 10e juni</span>
      </div>
      <div class="detail">
        <span class="detail__label">Utspring</span>
        <span class="detail__value">kl. [HH:MM]</span>
      </div>
      <div class="detail">
        <span class="detail__label">Mottagning</span>
        <span class="detail__value">kl. [HH:MM]</span>
      </div>
      <div class="detail">
        <span class="detail__label">Plats</span>
        <span class="detail__value"></span>
      </div>
    </section>

    <section class="osa">
      <h2 class="osa__heading">OSA / Svara</h2>
      <form id="osa-form" class="osa__form">
        <label class="osa__field">
          <span>Namn</span>
          <input type="text" name="names" id="osa-names" placeholder="Ex: Selmer & familj" required />
        </label>

        <label class="osa__field">
          <span>Antal personer</span>
          <input type="number" name="count" id="osa-count" min="1" value="1" required />
        </label>

        <label class="osa__field">
          <span>Specialkost / Matval</span>
          <input type="text" name="food" id="osa-food" placeholder="Ex: Veganskt, glutenfritt..." />
        </label>

        <label class="osa__field">
          <span>Övrigt</span>
          <textarea name="other" id="osa-other" rows="3" placeholder="Ex: allergier eller meddelande"></textarea>
        </label>

        <button type="submit" class="osa__button">Skicka OSA</button>
      </form>

      <div class="osa__status" id="osa-status">Fyll i formuläret och klicka på Skicka OSA.</div>
      <div class="osa__summary" id="osa-summary"></div>
      <div class="osa__responses" id="osa-responses"></div>
    </section>

    <footer class="invitation__footer">
      <p class="invitation__footer-line">OSA senast 30e April till 070 625 55 43 eller via formuläret ovan.</p>
      <p class="invitation__footer-line">Varmt välkommen!</p>
    </footer>

    <div class="deco deco--bottom"></div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
